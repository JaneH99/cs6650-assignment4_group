# ========================
# Server (health endpoint only)
# ========================
server.port=8081

# ========================
# RabbitMQ
# ========================
spring.rabbitmq.host=172.31.31.147
spring.rabbitmq.port=5672
spring.rabbitmq.username=cc
spring.rabbitmq.password=o3o4

# ========================
# Room Configuration
# ========================
rabbitmq.rooms=20
rabbitmq.rooms.start=1
rabbitmq.rooms.end=20
rabbitmq.queue.message-ttl=60000
rabbitmq.queue.max-length=10000

# ========================
# Consumer Threading
# ========================
rabbitmq.consumer.threads=20
rabbitmq.consumer.prefetch=200

# ========================
# Redis
# ========================
spring.data.redis.host=172.31.31.147
spring.data.redis.port=6379
spring.data.redis.lettuce.pool.max-active=40
spring.data.redis.lettuce.pool.max-idle=30
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=2000ms

# ========================
# Database (PostgreSQL)
# ========================
# DB1 (rooms 1-10)
spring.datasource.url=jdbc:postgresql://db1.c8p0g0yoy776.us-east-1.rds.amazonaws.com:5432/postgres
spring.datasource.username=postgres1
spring.datasource.password=cscs6650
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-init-sql=SET synchronous_commit=off

# DB2 (rooms 11-20)
spring.datasource2.url=jdbc:postgresql://db2.c8p0g0yoy776.us-east-1.rds.amazonaws.com:5432/postgres
spring.datasource2.username=postgres2
spring.datasource2.password=cscs6650
spring.datasource2.hikari.maximum-pool-size=10
spring.datasource2.hikari.connection-init-sql=SET synchronous_commit=off

# ========================
# DB Writer Test
# ========================
db.test.enabled=false
db.test.message-count=1000

# ========================
# Batch Size Test
# ========================
db.batch-size-test.enabled=false
db.batch-size-test.total-messages=500000

# ========================
# Redis Publish Toggle
# ========================
redis.publish.enabled=true

# ========================
# Metrics API
# ========================
metrics.top-n=5

# ========================
# DB Metrics Logger
# ========================
db.metrics.enabled=true
db.metrics.interval-sec=5

# ========================
# DB Writer Metrics
# ========================
db.writer.metrics-interval-sec=5

# ========================
# DB Writer Thread Pool
# ========================
db.writer.threads=8
db.writer.batch-size=500
db.writer.flush-interval-ms=500
db.writer.buffer-capacity=500000
db.writer.max-retries=3

# ========================
# Circuit Breaker DB write
# ========================
resilience4j.circuitbreaker.instances.db-write.sliding-window-size=10
resilience4j.circuitbreaker.instances.db-write.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.db-write.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.db-write.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.db-write.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.db-write.permitted-number-of-calls-in-half-open-state=3

# ========================
# Circuit Breaker Redis publish
# ========================
resilience4j.circuitbreaker.instances.redis-publish.sliding-window-size=10
resilience4j.circuitbreaker.instances.redis-publish.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.redis-publish.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.redis-publish.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.redis-publish.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.redis-publish.permitted-number-of-calls-in-half-open-state=3