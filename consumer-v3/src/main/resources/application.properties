resilience4j.circuitbreaker.instances.redis-publish.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.redis-publish.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.redis-publish.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.redis-publish.permitted-number-of-calls-in-half-open-state=3