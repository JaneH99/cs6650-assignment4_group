# ========================
# Server (health endpoint only)
# ========================
server.port=8081

# ========================
# RabbitMQ
# ========================
spring.rabbitmq.host=52.71.253.177
spring.rabbitmq.port=5672
spring.rabbitmq.username=cc
spring.rabbitmq.password=o3o4
spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.initial-interval=2000ms
spring.rabbitmq.template.retry.max-attempts=10

# ========================
# Room Configuration
# ========================
rabbitmq.rooms=20
rabbitmq.rooms.start=1
rabbitmq.rooms.end=20
rabbitmq.queue.message-ttl=60000
rabbitmq.queue.max-length=10000

# Number of partitions per room for queue partitioning optimization.
# Must match the value in producer application.properties.
# Total queues = rooms * partitionsPerRoom = 20 * 3 = 60
rabbitmq.partitions.per.room=3

# ========================
# Consumer Threading
# ========================
# consumerThreads should be >= totalPartitions (rooms * partitionsPerRoom)
# so each partition can have a dedicated channel without sharing.
# 20 rooms * 3 partitions = 60 total partitions
rabbitmq.consumer.threads=60
rabbitmq.consumer.prefetch=200

# ========================
# Redis
# ========================
spring.data.redis.host=52.71.253.177
spring.data.redis.port=6379
spring.data.redis.lettuce.pool.max-active=30
spring.data.redis.lettuce.pool.max-idle=20
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=2000ms

