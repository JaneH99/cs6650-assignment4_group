services:
  # 数据库 (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=helen
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=chatdb
    ports:
      - "5432:5432"
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U helen -d chatdb" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-broker
    ports:
      - "5672:5672"
      - "15672:15672"
    # 用 rabbitmq-diagnostics check_port_connectivity 确认 AMQP 端口真正可接受连接
    # 而不只是容器进程启动了
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 20s

  # Producer 服务
  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: producer-api
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      # 等 Spring Boot 完全启动并通过 /actuator/health 才算就绪
      # start_period 给 ChannelPool 重试连接 RabbitMQ 留足时间
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  # Consumer 服务
  consumer:
    build:
      context: .
      dockerfile: consumer-v3/Dockerfile
    container_name: consumer-worker
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 测试客户端：等 producer 真正健康后再启动
  test-client:
    build:
      context: .
      dockerfile: test-client/Dockerfile
    container_name: test-client
    depends_on:
      producer:
        condition: service_healthy